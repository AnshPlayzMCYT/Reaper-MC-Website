<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaper MC | Admin Login</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        'brand-darkest': '#050f18',
                        'brand-dark': '#0d1f2e',
                        'brand-light': '#142a3d',
                        'brand-border': '#1d3449',
                        'brand-text': '#99aec2',
                        'brand-blue': '#008bff'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-darkest text-brand-text min-h-screen flex items-center justify-center p-4">

    <!-- Global Page Loader -->
    <div id="page-loader"
        class="fixed inset-0 z-[9999] bg-brand-dark flex flex-col items-center justify-center transition-opacity duration-500">
        <i class="ri-loader-4-line text-5xl text-brand-blue animate-spin mb-4 drop-shadow-2xl"></i>
    </div>

    <!-- Modals Container -->
    <div id="modals"></div>

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <img src="https://static.readdy.ai/image/77fb13bf09ca7e6cd3a010ee816e6478/b15e1ab27f31f6972fd10171fc3fdcd7.png"
                alt="Logo" class="w-20 h-20 mx-auto mb-4 drop-shadow-[0_0_15px_rgba(0,139,255,0.3)]">
            <h1 class="text-3xl font-black text-white mb-2">Admin Portal</h1>
            <p class="text-brand-text">Authorized Personnel Only</p>
        </div>

        <div class="bg-brand-dark border border-brand-border rounded-xl shadow-2xl p-8 mb-6 relative overflow-hidden">
            <div id="error-message"
                class="hidden bg-red-500/10 border border-red-500/50 text-red-500 p-3 rounded-lg mb-6 text-sm font-semibold flex items-center gap-2">
                <i class="ri-error-warning-line text-lg"></i>
                <span id="error-text">Access Denied. You are not authorized.</span>
            </div>

            <form id="admin-login-form" class="space-y-6 text-center">
                <p class="text-sm text-brand-text mb-2">Please enter the 6-digit code from your Google Authenticator
                    app.</p>

                <div>
                    <input type="text" id="totp-code" name="totp-code" maxlength="6" pattern="[0-9]{6}" required
                        class="w-full bg-brand-darkest border border-brand-border rounded-lg py-4 px-4 text-center text-3xl font-mono text-white tracking-[0.5em] focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all"
                        placeholder="••••••" autocomplete="off" autofocus>
                </div>

                <button type="submit" id="auth-submit-btn"
                    class="w-full bg-brand-blue hover:bg-brand-blue/80 text-white font-bold py-3 px-4 rounded-lg transition-all shadow-lg flex justify-center items-center gap-2">
                    <i class="ri-login-circle-line"></i> Verify Code
                </button>
            </form>
        </div>

        <div class="text-center">
            <a href="index.html"
                class="text-sm font-semibold text-brand-text hover:text-white transition-colors flex items-center justify-center gap-1">
                <i class="ri-arrow-left-line"></i> Return to Store
            </a>
        </div>
    </div>

    <!-- Script -->
    <script>
        const form = document.getElementById('admin-login-form');
        const codeInput = document.getElementById('totp-code');
        const btn = document.getElementById('auth-submit-btn');
        const errorBox = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');

        const API_URL = '/api';

        // Filter input to only allow numbers
        codeInput.addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.add('hidden');

            const code = codeInput.value.trim();
            if (code.length !== 6) {
                errorText.textContent = 'Please enter a valid 6-digit code.';
                errorBox.classList.remove('hidden');
                return;
            }

            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<i class="ri-loader-4-line animate-spin"></i> Verifying...`;
            btn.disabled = true;

            try {
                const payload = JSON.stringify({ code: code });

                const response = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: payload
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    btn.innerHTML = `<i class="ri-check-line text-green-500"></i> Access Granted`;
                    // Save custom JWT to localStorage
                    localStorage.setItem('admin_token', data.token);
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 500);
                } else {
                    throw new Error(data.error || 'Authentication failed. Incorrect code.');
                }
            } catch (error) {
                console.error("Login failed:", error);
                errorText.textContent = error.message;
                errorBox.classList.remove('hidden');
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                codeInput.value = '';
                codeInput.focus();
            }
        });

        // Hide loader once script is ready
        window.addEventListener('load', () => {
            const loader = document.getElementById('page-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }

            // Check if already authenticated via Custom JWT
            const token = localStorage.getItem('admin_token');
            if (token) {
                // Quick verification request
                fetch(`${API_URL}/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => {
                    if (res.ok) {
                        window.location.href = 'admin.html';
                    } else {
                        localStorage.removeItem('admin_token');
                    }
                }).catch(e => console.error(e));
            }
        });
    </script>
</body>

</html>
