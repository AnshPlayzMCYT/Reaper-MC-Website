<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaper MC | Sign Up</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        'brand-darkest': '#050f18',
                        'brand-dark': '#0d1f2e',
                        'brand-light': '#142a3d',
                        'brand-border': '#1d3449',
                        'brand-text': '#99aec2',
                        'brand-blue': '#008bff',
                        secondary: '#8b5cf6',
                    },
                    keyframes: {
                        loading: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(200%)' }
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-dark text-brand-text min-h-screen flex items-center justify-center p-4">

    <!-- Global Page Loader -->
    <div id="page-loader"
        class="fixed inset-0 z-[9999] bg-brand-dark flex flex-col items-center justify-center transition-opacity duration-500">
        <img src="https://static.readdy.ai/image/77fb13bf09ca7e6cd3a010ee816e6478/b15e1ab27f31f6972fd10171fc3fdcd7.png"
            alt="Loading..." class="w-24 h-24 drop-shadow-2xl mb-4 animate-pulse">
        <div class="w-48 h-1.5 bg-brand-darkest rounded-full overflow-hidden relative">
            <div
                class="absolute top-0 left-0 h-full w-1/2 bg-brand-blue rounded-full animate-[loading_1.5s_ease-in-out_infinite]">
            </div>
        </div>
    </div>
    <div class="bg-brand-light border border-brand-border rounded-xl shadow-2xl p-8 max-w-md w-full relative">
        <a href="index.html" class="absolute top-4 left-4 text-brand-text hover:text-white transition-colors">
            <i class="ri-arrow-left-line text-xl"></i>
        </a>

        <div class="text-center mb-6">
            <img src="https://static.readdy.ai/image/77fb13bf09ca7e6cd3a010ee816e6478/b15e1ab27f31f6972fd10171fc3fdcd7.png"
                alt="Reaper MC Logo" class="w-20 mx-auto mb-2 drop-shadow-lg">
            <h2 class="text-2xl font-black text-white">Create an Account</h2>
            <p class="text-xs mt-1">Join the community and claim your ranks.</p>
        </div>

        <!-- Error Message Container -->
        <div id="auth-error"
            class="hidden bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-md mb-4 text-center">
        </div>

        <form id="signup-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1 text-white">Minecraft Username <span
                        class="text-red-400">*</span></label>
                <input type="text" id="mc-username" required
                    class="w-full bg-brand-darkest border border-brand-border rounded-lg py-2.5 px-4 text-white focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-colors"
                    placeholder="e.g. Notch">
                <p class="text-[10px] mt-1 text-brand-text">Must be an exact match to receive store items.</p>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1 text-white">Email Address <span
                        class="text-red-400">*</span></label>
                <input type="email" id="email" required
                    class="w-full bg-brand-darkest border border-brand-border rounded-lg py-2.5 px-4 text-white focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-colors"
                    placeholder="player@example.com">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1 text-white">Password <span
                        class="text-red-400">*</span></label>
                <input type="password" id="password" required minlength="6"
                    class="w-full bg-brand-darkest border border-brand-border rounded-lg py-2.5 px-4 text-white focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-colors"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="signup-btn"
                class="w-full mt-2 bg-secondary hover:bg-secondary/90 text-white font-bold py-3 rounded-lg transition-transform active:scale-95 flex items-center justify-center">
                <span id="signup-text">Create Account</span>
                <i id="signup-spinner" class="ri-loader-4-line animate-spin hidden ml-2"></i>
            </button>
        </form>

        <div class="mt-5 flex items-center">
            <div class="flex-grow border-t border-brand-border"></div>
            <span class="px-3 text-sm text-brand-text">or</span>
            <div class="flex-grow border-t border-brand-border"></div>
        </div>

        <button id="google-login-btn"
            class="mt-5 w-full bg-white hover:bg-gray-100 text-gray-900 font-bold py-3 px-4 rounded-lg flex justify-center items-center gap-2 transition-transform active:scale-95">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
            Sign up with Google
        </button>

        <p class="text-center mt-6 text-sm">
            Already have an account? <a href="login.html" class="text-brand-blue font-semibold hover:underline">Login
                here</a>
        </p>
    </div>

    <!-- Firebase Auth Script -->
    <script type="module" src="js/auth.js"></script>
    <script>
        // --- Page Loader Script ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('page-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500); // Wait for fade out transition (duration-500)
            }
        });
    </script>
</body>

</html>
