<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaper MC | Reset Password</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        'brand-darkest': '#050f18',
                        'brand-dark': '#0d1f2e',
                        'brand-light': '#142a3d',
                        'brand-border': '#1d3449',
                        'brand-text': '#99aec2',
                        'brand-blue': '#008bff',
                        secondary: '#8b5cf6',
                    },
                    keyframes: {
                        loading: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(200%)' }
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-dark text-brand-text min-h-screen flex items-center justify-center p-4">

    <!-- Global Page Loader -->
    <div id="page-loader"
        class="fixed inset-0 z-[9999] bg-brand-dark flex flex-col items-center justify-center transition-opacity duration-500">
        <img src="https://static.readdy.ai/image/77fb13bf09ca7e6cd3a010ee816e6478/b15e1ab27f31f6972fd10171fc3fdcd7.png"
            alt="Loading..." class="w-24 h-24 drop-shadow-2xl mb-4 animate-pulse">
        <div class="w-48 h-1.5 bg-brand-darkest rounded-full overflow-hidden relative">
            <div
                class="absolute top-0 left-0 h-full w-1/2 bg-brand-blue rounded-full animate-[loading_1.5s_ease-in-out_infinite]">
            </div>
        </div>
    </div>
    <div class="bg-brand-light border border-brand-border rounded-xl shadow-2xl p-8 max-w-md w-full relative">
        <a href="login.html" class="absolute top-4 left-4 text-brand-text hover:text-white transition-colors">
            <i class="ri-arrow-left-line text-xl"></i>
        </a>

        <div class="text-center mb-8 mt-4">
            <i class="ri-lock-password-fill text-5xl text-brand-blue drop-shadow-lg mb-2"></i>
            <h2 class="text-3xl font-black text-white">Reset Password</h2>
            <p class="text-sm mt-2">Enter your email and we'll send you a link to reset your password.</p>
        </div>

        <!-- Error/Success Message Container -->
        <div id="auth-error"
            class="hidden bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-md mb-4 text-center">
        </div>
        <div id="auth-success"
            class="hidden bg-green-500/10 border border-green-500/50 text-green-500 text-sm p-3 rounded-md mb-4 text-center">
            Password reset email sent! Check your inbox.
        </div>

        <form id="forgot-password-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1 text-white">Email Address</label>
                <input type="email" id="reset-email" required
                    class="w-full bg-brand-darkest border border-brand-border rounded-lg py-3 px-4 text-white focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-colors"
                    placeholder="player@example.com">
            </div>

            <button type="submit" id="reset-btn"
                class="w-full bg-brand-blue hover:opacity-90 text-white font-bold py-3 rounded-lg transition-transform active:scale-95 flex items-center justify-center mt-2">
                <span id="reset-text">Send Reset Link</span>
                <i id="reset-spinner" class="ri-loader-4-line animate-spin hidden ml-2"></i>
            </button>
        </form>

        <p class="text-center mt-6 text-sm">
            Remember your password? <a href="login.html" class="text-brand-blue font-semibold hover:underline">Log
                In</a>
        </p>
    </div>

    <!-- Firebase Auth Script -->
    <script type="module" src="js/auth.js"></script>
    <script>
        // --- Page Loader Script ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('page-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500); // Wait for fade out transition (duration-500)
            }
        });
    </script>
</body>

</html>
